name: Pipeline Pertama
on:
  push:
    branches: ["main"]
jobs:
  Hello:
    runs-on: ubuntu-latest
    steps:
      - name: Ucapin salam
        run: echo "Halo, ini pipeline pertamaku!"
      - name: Cek waktu sekarang
        run: date

  Lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flake8
        run: pip install flake8
      - name: Run linter
        run: flake8 app.py --max-line-length=120

  Test:
    needs: Lint
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4
      - name: Install pytest
        run: pip install pytest
      - name: Run unit tests
        run: pytest test_app.py -v
